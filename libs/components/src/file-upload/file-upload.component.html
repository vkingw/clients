<ng-template #labelContent>
  <ng-content select="bit-label"></ng-content>
</ng-template>

@if (useDropzoneVariant()) {
  <div class="tw-flex-col tw-flex tw-gap-2 [&_bit-hint]:tw-m-0">
    <label
      [id]="labelId"
      class="tw-flex tw-items-center tw-gap-0.5 tw-text-sm/5 tw-font-medium tw-max-w-full"
      [class.tw-text-fg-inactive]="disabled()"
    >
      <ng-container *ngTemplateOutlet="labelContent"></ng-container>
    </label>

    <bit-dropzone
      [accept]="accept()"
      [maxFileSize]="maxFileSize()!"
      [multiple]="multiple()"
      [errorMessage]="errorMessage()"
      [disabled]="disabled()"
      [ariaDescribedBy]="ariaDescribedBy()"
      (filesSelected)="onFilesSelected($event)"
    />

    @if (errorMessage()) {
      <!-- bit-error expects [i18nKey, params]; its default branch renders error[1].message for custom strings -->
      <bit-error [error]="['', { message: errorMessage() }]"></bit-error>
    } @else {
      <ng-content select="bit-hint"></ng-content>
    }

    <bit-file-list
      [files]="files()"
      [disabled]="disabled()"
      (fileRemoved)="onFileRemoved($event)"
    />
  </div>
} @else {
  <div class="tw-flex tw-flex-col tw-gap-2">
    <label
      [id]="labelId"
      [attr.for]="inputId"
      class="tw-flex tw-items-center tw-gap-0.5 tw-text-sm/5 tw-font-medium tw-max-w-full"
      [class.tw-text-fg-inactive]="disabled()"
    >
      <ng-container *ngTemplateOutlet="labelContent"></ng-container>
    </label>

    <div bitFieldContainer class="tw-relative" [hasError]="!!errorMessage()">
      <div
        class="tw-relative tw-flex tw-shrink-0 tw-items-center tw-border-e tw-border-border-base tw-px-3 tw-py-2 tw-rounded-s-[11px]"
        [class.tw-bg-bg-quaternary]="!disabled()"
        [class.tw-bg-bg-inactive]="disabled()"
        [class.tw-text-fg-inactive]="disabled()"
      >
        <span class="tw-text-sm tw-pointer-events-none">{{ "chooseFile" | i18n }}</span>
      </div>
      <!-- Button overlay: accessible control with no native file-input value to announce -->
      <button
        [id]="inputId"
        type="button"
        [attr.aria-labelledby]="ariaLabelledBy"
        [attr.aria-describedby]="ariaDescribedBy()"
        [disabled]="disabled() || null"
        class="tw-absolute tw-inset-0 tw-size-full tw-opacity-0 tw-cursor-pointer disabled:tw-cursor-not-allowed"
        (click)="openFilePicker()"
      ></button>
      <!-- Hidden file input: triggers the OS file picker, kept out of the AT -->
      <input
        #fileInput
        type="file"
        aria-hidden="true"
        tabindex="-1"
        class="tw-sr-only"
        [accept]="accept()"
        [multiple]="multiple()"
        (change)="onButtonFileChange($event)"
        [disabled]="disabled() || null"
      />
      <span
        class="tw-flex tw-overflow-hidden tw-flex-1 tw-min-w-0 tw-px-3 tw-py-2 tw-text-sm"
        [class.tw-text-fg-body-subtle]="!fileLabel() && !disabled()"
        [class.tw-text-fg-heading]="!!fileLabel() && !disabled()"
        [class.tw-text-fg-inactive]="disabled()"
      >
        @if (fileLabel(); as label) {
          <bit-truncated-filename [name]="label" />
        } @else {
          {{ "noFileChosen" | i18n }}
        }
      </span>
      <!-- Separate from the visible span so aria-live announcements don't conflict with the
           button's accessible name (statusId is included in ariaLabelledBy on the button). -->
      <span [id]="statusId" class="tw-sr-only" aria-live="polite" aria-atomic="true">
        {{ fileLabel() ? ("fileChosen" | i18n: fileLabel()) : ("chooseFile" | i18n) }}
      </span>
    </div>
    @if (errorMessage()) {
      <!-- bit-error expects [i18nKey, params]; its default branch renders error[1].message for custom strings -->
      <bit-error class="!tw-mt-0" [error]="['', { message: errorMessage() }]"></bit-error>
    } @else {
      <ng-content select="bit-hint"></ng-content>
    }
  </div>
}
