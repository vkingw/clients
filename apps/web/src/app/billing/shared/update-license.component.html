<form [formGroup]="updateLicenseForm" [bitSubmit]="submit">
  <bit-form-field>
    <bit-label *ngIf="showAutomaticSyncAndManualUpload">{{ "licenseFile" | i18n }}</bit-label>
    <div class="tw-text-main tw-flex tw-items-center tw-h-full tw-gap-2">
      <button
        bitButton
        type="button"
        size="small"
        buttonType="secondary"
        (click)="fileSelector.click()"
      >
        {{ "chooseFile" | i18n }}
      </button>
      <span>{{ this.licenseFile ? this.licenseFile.name : ("noFileChosen" | i18n) }}</span>
    </div>
    <input
      bitInput
      #fileSelector
      type="file"
      formControlName="file"
      (change)="setSelectedFile($event)"
      hidden
      class="tw-hidden"
    />
    <bit-hint>{{
      "licenseFileDesc"
        | i18n
          : (!organizationId
              ? "bitwarden_premium_license.json"
              : "bitwarden_organization_license.json")
    }}</bit-hint>
  </bit-form-field>
  <div class="tw-flex tw-gap-2 tw-mt-4">
    <button type="submit" buttonType="primary" bitButton bitFormButton>
      {{ "submit" | i18n }}
    </button>
    <button
      bitButton
      *ngIf="showCancel"
      bitFormButton
      buttonType="secondary"
      type="button"
      [bitAction]="cancel"
    >
      {{ "cancel" | i18n }}
    </button>
  </div>
</form>
